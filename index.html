<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="game-wrapper">

    <!-- START SCREEN -->
    <div id="start-screen" class="screen">
        <h1 class="title">Water Drop</h1>

        <p>Collect as many droplets as possible</p>
        <p class="good">💧 +3</p>
        <p>Avoid bad drops!</p>
        <p class="bad">💧 -2</p>

        <p>Select Difficulty:</p>
        <div class="difficulty-buttons">
            <button onclick="setDifficulty('easy')" id="easy-btn">Easy</button>
            <button onclick="setDifficulty('normal')" id="normal-btn">Normal</button>
            <button onclick="setDifficulty('hard')" id="hard-btn">Hard</button>
        </div>

        <p id="difficulty-selected">Difficulty: Normal</p>

        <button id="start-btn">Start</button>

        <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="cw-logo bottom-logo">
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen hidden">
        <div id="game-container">

            <button id="in-game-restart-btn">Restart</button>

            <div class="clouds">
                <span>☁️</span>
                <span>☁️</span>
                <span>☁️</span>
                <span>☁️</span>
            </div>

            <div id="milestones">
                <span>💧</span>
                <span>💧</span>
                <span>💧</span>
                <span>💧</span>
                <span>💧</span>
                <span>💧</span>
            </div>

            <div class="bottom-bar">
                <span id="time">30s left</span>
                <span id="score">Score: 0</span>
            </div>

        </div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen hidden">
        <h1 class="title">Water Drop</h1>
        <div class="end-content">
            <p class="end-text">Final Score: <span id="final-score">0</span></p>
            <p class="end-text">Milestones Reached:</p>
            <div id="end-milestones"></div>
            <button id="restart-btn">Play Again</button>
        </div>

        <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="cw-logo bottom-logo">
    </div>

</div>

<footer>
  <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="cw-footer-logo">
  <p>
    <a href="https://www.charitywater.org/" target="_blank">Website</a> |
    <a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
  </p>
</footer>

<script src="script.js"></script>
</body>
</html>
